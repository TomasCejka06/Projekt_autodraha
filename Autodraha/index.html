<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Car Track Builder</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- MENU -->
<section id="menu">

<h1>Car Track Builder</h1>

<div class="menu-buttons">
<button id="newMapBtn">Nová mapa</button>
<button onclick="location.reload()">Načíst mapu</button>
</div>

<h2>Uložené mapy</h2>

<div id="savedMaps"></div>

</section>



<!-- EDITOR -->
<section id="editor" class="hidden">

<div class="toolbar">

<button id="saveMapBtn">Uložit mapu</button>
<button id="backBtn">Zpět do menu</button>

</div>

<div id="grid"></div>

</section>


<script type="module" src="js/index.js"></script>

</body>
</html>
